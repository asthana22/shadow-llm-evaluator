<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primary LLM Test — Shadow Evaluator</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181b24;
      --surface-2: #1f2430;
      --border: #2a3142;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #6ee7b7;
      --accent-dim: #34d399;
      --error: #f87171;
      --warn: #fbbf24;
      --mono: "JetBrains Mono", "Fira Code", "Consolas", monospace;
      --sans: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--surface);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    .header-links {
      display: flex;
      gap: 0.75rem;
      font-size: 0.85rem;
    }

    .header-links a {
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
    }

    .header-links a:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--surface-2);
    }

    .panel-body { padding: 1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .field { margin-bottom: 0.9rem; }

    textarea, input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      resize: vertical;
    }

    textarea:focus, input:focus {
      outline: none;
      border-color: var(--accent-dim);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    button {
      background: var(--accent-dim);
      color: #052e1a;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover:not(:disabled) { opacity: 0.9; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint { font-size: 0.78rem; color: var(--muted); }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.82rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-family: var(--mono);
    }

    .badge.ok { border-color: var(--accent-dim); color: var(--accent); }
    .badge.err { border-color: var(--error); color: var(--error); }
    .badge.warn { border-color: var(--warn); color: var(--warn); }

    .assistant-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 4rem;
    }

    .assistant-content.empty {
      color: var(--muted);
      font-style: italic;
    }

    pre.raw {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      overflow: auto;
      max-height: 320px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    details { margin-top: 0.75rem; }

    summary {
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      user-select: none;
    }

    summary:hover { color: var(--text); }

    .mode-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .mode-toggle button {
      background: var(--surface-2);
      color: var(--muted);
      font-weight: 500;
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
    }

    .mode-toggle button.active {
      background: var(--accent-dim);
      color: #052e1a;
    }

    .hidden { display: none !important; }

    .error-box {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--error);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Primary LLM <span>Test UI</span></h1>
    <nav class="header-links">
      <a href="/metrics" target="_blank">Metrics</a>
      <a href="/health" target="_blank">Health</a>
      <a href="/docs" target="_blank">OpenAPI</a>
    </nav>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">Request</div>
      <div class="panel-body">
        <div class="mode-toggle">
          <button type="button" id="modeSimple" class="active">Simple</button>
          <button type="button" id="modeRaw">Raw JSON</button>
        </div>

        <div id="simpleForm">
          <div class="field">
            <label for="systemPrompt">System prompt (optional)</label>
            <textarea id="systemPrompt" rows="2" placeholder="You are a helpful assistant. Respond with JSON: {&quot;action&quot;: &quot;...&quot;}"></textarea>
          </div>
          <div class="field">
            <label for="userMessage">User message</label>
            <textarea id="userMessage" rows="6" placeholder="What should the primary LLM do?"></textarea>
          </div>
          <div class="row">
            <div class="field">
              <label for="model">Model (optional)</label>
              <input type="text" id="model" placeholder="server default" />
            </div>
            <div class="field">
              <label for="temperature">Temperature</label>
              <input type="number" id="temperature" min="0" max="2" step="0.1" value="0.7" />
            </div>
          </div>
        </div>

        <div id="rawForm" class="hidden">
          <div class="field">
            <label for="rawBody">POST /v1/chat body</label>
            <textarea id="rawBody" rows="14" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="button" id="sendBtn">Send to primary LLM</button>
          <span class="hint" id="modelHint">Loading config…</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">Response</div>
      <div class="panel-body">
        <div id="errorBox" class="error-box hidden"></div>

        <div class="status-bar" id="statusBar">
          <span class="badge" id="statusCode">—</span>
          <span class="badge" id="latency">— ms</span>
          <span class="badge" id="requestId">—</span>
        </div>

        <label>Assistant message</label>
        <div class="assistant-content empty" id="assistantContent">Send a request to see the primary LLM response.</div>

        <details>
          <summary>Raw response JSON</summary>
          <pre class="raw" id="rawResponse">{}</pre>
        </details>

        <details>
          <summary>Request payload sent</summary>
          <pre class="raw" id="rawRequest">{}</pre>
        </details>
      </div>
    </section>
  </main>

  <script>
    const els = {
      modeSimple: document.getElementById("modeSimple"),
      modeRaw: document.getElementById("modeRaw"),
      simpleForm: document.getElementById("simpleForm"),
      rawForm: document.getElementById("rawForm"),
      systemPrompt: document.getElementById("systemPrompt"),
      userMessage: document.getElementById("userMessage"),
      model: document.getElementById("model"),
      temperature: document.getElementById("temperature"),
      rawBody: document.getElementById("rawBody"),
      sendBtn: document.getElementById("sendBtn"),
      modelHint: document.getElementById("modelHint"),
      errorBox: document.getElementById("errorBox"),
      statusCode: document.getElementById("statusCode"),
      latency: document.getElementById("latency"),
      requestId: document.getElementById("requestId"),
      assistantContent: document.getElementById("assistantContent"),
      rawResponse: document.getElementById("rawResponse"),
      rawRequest: document.getElementById("rawRequest"),
    };

    let defaultModel = "";
    let rawMode = false;

    function setMode(raw) {
      rawMode = raw;
      els.modeSimple.classList.toggle("active", !raw);
      els.modeRaw.classList.toggle("active", raw);
      els.simpleForm.classList.toggle("hidden", raw);
      els.rawForm.classList.toggle("hidden", !raw);
    }

    els.modeSimple.addEventListener("click", () => setMode(false));
    els.modeRaw.addEventListener("click", () => setMode(true));

    function buildPayload() {
      if (rawMode) {
        try {
          return JSON.parse(els.rawBody.value);
        } catch (e) {
          throw new Error("Invalid JSON in raw body: " + e.message);
        }
      }

      const messages = [];
      const system = els.systemPrompt.value.trim();
      const user = els.userMessage.value.trim();

      if (!user) throw new Error("User message is required.");

      if (system) messages.push({ role: "system", content: system });
      messages.push({ role: "user", content: user });

      const payload = {
        messages,
        temperature: Number(els.temperature.value),
      };

      const model = els.model.value.trim();
      if (model) payload.model = model;

      return payload;
    }

    function extractAssistantText(data) {
      if (!data || typeof data !== "object") return null;
      const choice = data.choices?.[0];
      if (!choice) return null;
      const content = choice.message?.content ?? choice.text;
      return typeof content === "string" ? content : JSON.stringify(content, null, 2);
    }

    function setBadge(el, text, kind) {
      el.textContent = text;
      el.className = "badge" + (kind ? " " + kind : "");
    }

    function showError(msg) {
      els.errorBox.textContent = msg;
      els.errorBox.classList.remove("hidden");
    }

    function clearError() {
      els.errorBox.classList.add("hidden");
    }

    async function loadConfig() {
      try {
        const res = await fetch("/test/config");
        const cfg = await res.json();
        defaultModel = cfg.default_model || "";
        els.model.placeholder = defaultModel || "server default";
        els.modelHint.textContent = "Default model: " + (defaultModel || "from server env");

        const sample = {
          model: defaultModel || undefined,
          messages: [
            { role: "user", content: "Reply with JSON only: {\"action\": \"greet\", \"message\": \"hello\"}" },
          ],
          temperature: 0.7,
        };
        if (!sample.model) delete sample.model;
        els.rawBody.value = JSON.stringify(sample, null, 2);
      } catch {
        els.modelHint.textContent = "Could not load /test/config";
      }
    }

    async function sendRequest() {
      clearError();
      els.sendBtn.disabled = true;

      let payload;
      try {
        payload = buildPayload();
      } catch (e) {
        showError(e.message);
        els.sendBtn.disabled = false;
        return;
      }

      els.rawRequest.textContent = JSON.stringify(payload, null, 2);

      const started = performance.now();
      try {
        const res = await fetch("/v1/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const elapsed = Math.round(performance.now() - started);
        const requestId = res.headers.get("X-Request-ID") || "—";
        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = { _raw: text };
        }

        const ok = res.ok;
        setBadge(els.statusCode, "HTTP " + res.status, ok ? "ok" : "err");
        setBadge(els.latency, elapsed + " ms", ok ? "ok" : "warn");
        setBadge(els.requestId, "ID " + requestId.slice(0, 8) + "…", "");

        els.rawResponse.textContent = typeof data === "string"
          ? data
          : JSON.stringify(data, null, 2);

        if (!ok && !data.choices) {
          const detail = data.detail || data.error?.message || data.error || text;
          showError(typeof detail === "string" ? detail : JSON.stringify(detail));
        }

        const assistant = extractAssistantText(data);
        if (assistant) {
          els.assistantContent.textContent = assistant;
          els.assistantContent.classList.remove("empty");
        } else if (!ok) {
          els.assistantContent.textContent = data.error?.message || data.error || text || "Request failed.";
          els.assistantContent.classList.remove("empty");
        } else {
          els.assistantContent.textContent = "(No assistant content in response)";
          els.assistantContent.classList.add("empty");
        }
      } catch (e) {
        setBadge(els.statusCode, "Network error", "err");
        showError(e.message);
        els.assistantContent.textContent = "Could not reach the API. Is uvicorn running?";
        els.assistantContent.classList.remove("empty");
      } finally {
        els.sendBtn.disabled = false;
      }
    }

    els.sendBtn.addEventListener("click", sendRequest);

    els.userMessage.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) sendRequest();
    });

    loadConfig();
  </script>
</body>
</html>
