services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: arq worker.main.WorkerSettings

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evaluator
      POSTGRES_PASSWORD: evaluator
      POSTGRES_DB: shadow_evaluator
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
